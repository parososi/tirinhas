<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Perfil do personagem — Humberto Incerto.">
  <title>Personagem — Humberto Incerto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Lato:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="personagem">

  <!-- ── Header / Masthead ── -->
  <header class="site-header" role="banner">
    <div class="header-inner">
      <a href="index.html" class="site-logo" aria-label="Humberto Incerto — página inicial">
        Humberto Incerto
      </a>
      <nav class="site-nav" aria-label="Navegação principal">
        <a href="arquivo.html" class="nav-link">Tirinhas</a>
        <a href="personagens.html" class="nav-link active" aria-current="page">Personagens</a>
        <a href="sobre.html" class="nav-link">Sobre</a>
        <a href="https://apoia.se/humbertoincerto" class="nav-link nav-apoiar" target="_blank" rel="noopener noreferrer">Apoiar</a>
      </nav>
    </div>
  </header>

  <!-- ── Conteúdo principal ── -->
  <main class="main-content">
    <div class="personagem-page">

      <!-- Botão voltar -->
      <a href="personagens.html" class="personagem-back" aria-label="Voltar para personagens">
        ← Personagens
      </a>

      <!-- Loading -->
      <div id="personagem-loading" class="loading-state" role="status" aria-live="polite">
        <div class="ink-loader" aria-hidden="true"></div>
        <span class="loading-text">Carregando...</span>
      </div>

      <!-- Conteúdo do personagem — preenchido via JS -->
      <div id="personagem-content" hidden>

        <div class="personagem-layout">

          <!-- Coluna da ilustração -->
          <div class="personagem-img-col" id="personagem-img-col">
            <!-- imagem inserida via JS -->
          </div>

          <!-- Coluna de informações -->
          <div class="personagem-info-col">

            <div class="personagem-nome" id="personagem-nome"></div>
            <div class="personagem-apelido" id="personagem-apelido"></div>

            <div class="personagem-section-label">Sobre o personagem</div>
            <p class="personagem-descricao" id="personagem-descricao"></p>

            <div class="personagem-section-label">Características</div>
            <div class="personagem-traits" id="personagem-traits"></div>

            <div class="personagem-hashtag" id="personagem-hashtag"></div>
            <div class="personagem-debut" id="personagem-debut"></div>

          </div><!-- /.personagem-info-col -->
        </div><!-- /.personagem-layout -->

      </div><!-- /#personagem-content -->

      <!-- Não encontrado -->
      <div id="personagem-not-found" class="personagem-not-found" hidden>
        <h2>Personagem não encontrado.</h2>
        <p><a href="personagens.html">← ver todos os personagens</a></p>
      </div>

    </div><!-- /.personagem-page -->
  </main>

  <!-- ── Botão fixo de apoio ── -->
  <a
    href="https://apoia.se/humbertoincerto"
    class="apoiar-btn"
    target="_blank"
    rel="noopener noreferrer"
    aria-label="Apoiar Humberto Incerto no Apoia.se"
  >
    <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
      <path d="M8 13.5l-1.1-1C3 9.1 1 7.3 1 5.2 1 3.4 2.4 2 4.2 2c1 0 2 .5 2.8 1.3.8-.8 1.8-1.3 2.8-1.3C11.6 2 13 3.4 13 5.2c0 2.1-2 3.9-5.9 7.3L8 13.5z"/>
    </svg>
    Apoiar
  </a>

  <!-- ── Footer ── -->
  <footer class="site-footer" role="contentinfo">
    <div class="footer-inner">
      <span class="footer-brand">Humberto Incerto</span>
      <div class="footer-links">
        <a href="https://instagram.com/humbertoincerto" class="footer-link" target="_blank" rel="noopener noreferrer">Instagram</a>
        <a href="https://apoia.se/humbertoincerto" class="footer-link" target="_blank" rel="noopener noreferrer">Apoia.se</a>
        <a href="personagens.html" class="footer-link">← Personagens</a>
      </div>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
