<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300" style="background:#fafaf8">
  <!-- Borda externa -->
  <rect x="4" y="4" width="892" height="292" fill="none" stroke="#0a0a0a" stroke-width="3"/>

  <!-- Divisórias dos painéis -->
  <line x1="304" y1="4" x2="304" y2="296" stroke="#0a0a0a" stroke-width="3"/>
  <line x1="596" y1="4" x2="596" y2="296" stroke="#0a0a0a" stroke-width="3"/>

  <!-- Painel 1 - cenário simples -->
  <ellipse cx="90" cy="200" rx="60" ry="25" fill="none" stroke="#0a0a0a" stroke-width="1.5"/>
  <line x1="60" y1="200" x2="60" y2="240" stroke="#0a0a0a" stroke-width="1.5"/>
  <line x1="120" y1="200" x2="120" y2="240" stroke="#0a0a0a" stroke-width="1.5"/>
  <circle cx="90" cy="140" r="28" fill="none" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="90" y1="168" x2="90" y2="200" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="90" y1="178" x2="65" y2="198" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="90" y1="178" x2="115" y2="198" stroke="#0a0a0a" stroke-width="2"/>
  <circle cx="82" cy="135" r="3" fill="#0a0a0a"/>
  <circle cx="98" cy="135" r="3" fill="#0a0a0a"/>
  <path d="M 83 150 Q 90 155 97 150" fill="none" stroke="#0a0a0a" stroke-width="1.5"/>
  <!-- balão de fala -->
  <ellipse cx="180" cy="100" rx="55" ry="28" fill="#fafaf8" stroke="#0a0a0a" stroke-width="1.5"/>
  <polygon points="140,118 130,140 155,122" fill="#fafaf8" stroke="#0a0a0a" stroke-width="1.5"/>
  <text x="180" y="96" font-family="serif" font-size="11" text-anchor="middle" fill="#0a0a0a">...</text>
  <text x="180" y="112" font-family="serif" font-size="9" text-anchor="middle" fill="#0a0a0a">painel 1</text>
  <!-- chão -->
  <line x1="20" y1="242" x2="280" y2="242" stroke="#0a0a0a" stroke-width="1.5"/>
  <line x1="20" y1="246" x2="60" y2="246" stroke="#0a0a0a" stroke-width="1"/>
  <line x1="80" y1="246" x2="130" y2="246" stroke="#0a0a0a" stroke-width="1"/>
  <line x1="150" y1="246" x2="200" y2="246" stroke="#0a0a0a" stroke-width="1"/>
  <line x1="230" y1="246" x2="280" y2="246" stroke="#0a0a0a" stroke-width="1"/>

  <!-- Painel 2 - ação -->
  <circle cx="448" cy="140" r="28" fill="none" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="448" y1="168" x2="430" y2="200" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="448" y1="168" x2="466" y2="200" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="448" y1="178" x2="420" y2="160" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="448" y1="178" x2="476" y2="155" stroke="#0a0a0a" stroke-width="2"/>
  <circle cx="440" cy="135" r="3" fill="#0a0a0a"/>
  <circle cx="456" cy="135" r="3" fill="#0a0a0a"/>
  <!-- linhas de movimento -->
  <line x1="390" y1="100" x2="415" y2="120" stroke="#0a0a0a" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="385" y1="120" x2="412" y2="132" stroke="#0a0a0a" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="395" y1="85" x2="418" y2="110" stroke="#0a0a0a" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- balão exclamação -->
  <ellipse cx="530" cy="90" rx="40" ry="28" fill="#fafaf8" stroke="#0a0a0a" stroke-width="1.5"/>
  <polygon points="490,105 472,128 500,110" fill="#fafaf8" stroke="#0a0a0a" stroke-width="1.5"/>
  <text x="530" y="86" font-family="serif" font-style="italic" font-size="22" font-weight="bold" text-anchor="middle" fill="#0a0a0a">!</text>
  <text x="530" y="108" font-family="serif" font-size="9" text-anchor="middle" fill="#0a0a0a">painel 2</text>
  <line x1="320" y1="242" x2="572" y2="242" stroke="#0a0a0a" stroke-width="1.5"/>

  <!-- Painel 3 - conclusão -->
  <ellipse cx="700" cy="200" rx="60" ry="25" fill="none" stroke="#0a0a0a" stroke-width="1.5"/>
  <line x1="670" y1="200" x2="670" y2="240" stroke="#0a0a0a" stroke-width="1.5"/>
  <line x1="730" y1="200" x2="730" y2="240" stroke="#0a0a0a" stroke-width="1.5"/>
  <circle cx="700" cy="140" r="28" fill="none" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="700" y1="168" x2="700" y2="200" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="700" y1="178" x2="675" y2="198" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="700" y1="178" x2="725" y2="198" stroke="#0a0a0a" stroke-width="2"/>
  <circle cx="692" cy="135" r="3" fill="#0a0a0a"/>
  <circle cx="708" cy="135" r="3" fill="#0a0a0a"/>
  <!-- olhos fechados feliz -->
  <path d="M 689 135 Q 692 131 695 135" fill="none" stroke="#0a0a0a" stroke-width="1.5"/>
  <path d="M 705 135 Q 708 131 711 135" fill="none" stroke="#0a0a0a" stroke-width="1.5"/>
  <path d="M 692 150 Q 700 158 708 150" fill="none" stroke="#0a0a0a" stroke-width="2"/>
  <!-- balão de fala -->
  <ellipse cx="810" cy="100" rx="55" ry="28" fill="#fafaf8" stroke="#0a0a0a" stroke-width="1.5"/>
  <polygon points="755,115 742,138 762,120" fill="#fafaf8" stroke="#0a0a0a" stroke-width="1.5"/>
  <text x="810" y="96" font-family="serif" font-size="11" text-anchor="middle" fill="#0a0a0a">:)</text>
  <text x="810" y="112" font-family="serif" font-size="9" text-anchor="middle" fill="#0a0a0a">painel 3</text>
  <line x1="612" y1="242" x2="880" y2="242" stroke="#0a0a0a" stroke-width="1.5"/>
</svg>
