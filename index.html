<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Humberto Incerto — tirinha brasileira feita à mão.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Humberto Incerto">
  <meta property="og:description" content="Tirinha brasileira feita à mão.">
  <title>Humberto Incerto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Lato:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="home">

  <!-- ── Header / Masthead ── -->
  <header class="site-header" role="banner">
    <div class="header-inner">
      <a href="index.html" class="site-logo" aria-label="Humberto Incerto — página inicial">
        Humberto Incerto
      </a>
      <nav class="site-nav" aria-label="Navegação principal">
        <a href="arquivo.html" class="nav-link">Tirinhas</a>
        <a href="personagens.html" class="nav-link">Personagens</a>
        <a href="sobre.html" class="nav-link">Sobre</a>
        <a href="https://apoia.se/humbertoincerto" class="nav-link nav-apoiar" target="_blank" rel="noopener noreferrer">Apoiar</a>
      </nav>
    </div>
  </header>

  <!-- ── Conteúdo principal ── -->
  <main class="main-content">
    <div class="home-page">

      <!-- Estado de loading -->
      <div id="loading-state" class="loading-state" role="status" aria-live="polite">
        <div class="ink-loader" aria-hidden="true"></div>
        <span class="loading-text">Carregando...</span>
      </div>

      <!-- Estado de erro -->
      <div id="error-state" class="error-state" hidden>
        <h2>Ops.</h2>
        <p>Não foi possível carregar as tirinhas.</p>
      </div>

      <!-- ── Hero: tirinha mais recente em destaque ── -->
      <section id="hero-section" class="hero-section" hidden aria-label="Tirinha mais recente">
        <!-- Preenchido via JS -->
      </section>

      <!-- ── Grid: tirinhas anteriores ── -->
      <section id="grid-section" class="grid-section" hidden aria-label="Tirinhas anteriores">
        <h2 class="section-heading">
          Tirinhas anteriores
          <a href="arquivo.html">Ver todas →</a>
        </h2>
        <div id="strips-grid" class="strips-grid" aria-label="Grade de tirinhas"></div>

        <!-- Paginação do grid -->
        <nav id="grid-pagination" class="grid-pagination" hidden aria-label="Paginação">
          <button type="button" id="grid-prev" class="grid-page-btn disabled" aria-label="Página anterior">
            ← Anteriores
          </button>
          <span id="grid-page-info" class="grid-page-info" aria-live="polite"></span>
          <button type="button" id="grid-next" class="grid-page-btn" aria-label="Próxima página">
            Próximas →
          </button>
        </nav>
      </section>

    </div><!-- /.home-page -->
  </main>

  <!-- ── Botão fixo de apoio ── -->
  <a
    href="https://apoia.se/humbertoincerto"
    class="apoiar-btn"
    target="_blank"
    rel="noopener noreferrer"
    aria-label="Apoiar Humberto Incerto no Apoia.se"
  >
    <!-- Ícone de coração -->
    <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
      <path d="M8 13.5l-1.1-1C3 9.1 1 7.3 1 5.2 1 3.4 2.4 2 4.2 2c1 0 2 .5 2.8 1.3.8-.8 1.8-1.3 2.8-1.3C11.6 2 13 3.4 13 5.2c0 2.1-2 3.9-5.9 7.3L8 13.5z"/>
    </svg>
    Apoiar
  </a>

  <!-- ── Footer ── -->
  <footer class="site-footer" role="contentinfo">
    <div class="footer-inner">
      <span class="footer-brand">Humberto Incerto</span>
      <div class="footer-links">
        <a href="https://instagram.com/humbertoincerto" class="footer-link" target="_blank" rel="noopener noreferrer">Instagram</a>
        <a href="https://apoia.se/humbertoincerto" class="footer-link" target="_blank" rel="noopener noreferrer">Apoia.se</a>
        <a href="arquivo.html" class="footer-link">Arquivo</a>
      </div>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
