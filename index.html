<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Tirinhas — quadrinhos autorais publicados dia sim, dia não.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Tirinhas">
  <meta property="og:description" content="Quadrinhos autorais publicados dia sim, dia não.">
  <title>Tirinhas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="reader">

  <!-- ── Header / Masthead ── -->
  <header class="site-header" role="banner">
    <div class="header-top-bar"></div>
    <div class="header-inner">
      <a href="index.html" class="site-logo" aria-label="Ir para a tirinha mais recente">
        Tirinhas
      </a>
      <nav class="site-nav" aria-label="Navegação principal">
        <a href="personagens.html" class="nav-link">Personagens</a>
        <a href="arquivo.html" class="nav-link">Arquivo</a>
      </nav>
    </div>
    <div class="header-dateline">
      <span id="header-date"></span>
      <span class="header-dateline-rule"></span>
      <span>dia sim, dia não</span>
    </div>
  </header>

  <!-- ── Conteúdo principal ── -->
  <main class="main-content">
    <div class="feed-page">

      <!-- Estado de loading -->
      <div id="loading-state" class="loading-state" role="status" aria-live="polite">
        <div class="ink-loader" aria-hidden="true"></div>
        <span class="loading-text">Carregando...</span>
      </div>

      <!-- Estado de erro -->
      <div id="error-state" class="error-state" hidden>
        <h2>Ops.</h2>
        <p>Não foi possível carregar as tirinhas.</p>
      </div>

      <!-- Feed de tirinhas -->
      <div id="comic-feed" hidden aria-label="Feed de tirinhas"></div>

      <!-- Paginação do feed -->
      <nav id="feed-pagination" class="feed-pagination" hidden aria-label="Paginação do feed">
        <button type="button" id="feed-prev" class="feed-page-btn disabled" aria-label="Página anterior">
          <span class="arrow" aria-hidden="true">←</span>
          <span>Anteriores</span>
        </button>
        <span id="feed-page-info" class="feed-page-info" aria-live="polite"></span>
        <button type="button" id="feed-next" class="feed-page-btn" aria-label="Próxima página">
          <span>Próximas</span>
          <span class="arrow" aria-hidden="true">→</span>
        </button>
      </nav>

    </div><!-- /.feed-page -->
  </main>

  <!-- ── Footer ── -->
  <footer class="site-footer" role="contentinfo">
    <span>dia sim, dia não.</span>
    <a href="arquivo.html" class="footer-back">ver arquivo →</a>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
