<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Arquivo de todas as tirinhas publicadas.">
  <title>Arquivo — Tirinhas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="archive">

  <!-- ── Header / Masthead ── -->
  <header class="site-header" role="banner">
    <div class="header-top-bar"></div>
    <div class="header-inner">
      <a href="index.html" class="site-logo" aria-label="Ir para a tirinha mais recente">
        Tirinhas
      </a>
      <nav class="site-nav" aria-label="Navegação principal">
        <a href="personagens.html" class="nav-link">Personagens</a>
        <a href="arquivo.html" class="nav-link active" aria-current="page">Arquivo</a>
      </nav>
    </div>
    <div class="header-dateline">
      <span id="header-date"></span>
      <span class="header-dateline-rule"></span>
      <span>dia sim, dia não</span>
    </div>
  </header>

  <!-- ── Conteúdo principal ── -->
  <main class="main-content">
    <div class="archive-page">

      <!-- Cabeçalho da página -->
      <div class="page-header">
        <h1>Arquivo</h1>
        <p class="page-subtitle" id="archive-total"></p>
      </div>

      <!-- Loading -->
      <div id="archive-loading" class="loading-state" role="status" aria-live="polite">
        <div class="ink-loader" aria-hidden="true"></div>
        <span class="loading-text">Carregando arquivo...</span>
      </div>

      <!-- Pesquisa -->
      <div class="archive-search-wrap">
        <input
          type="search"
          id="archive-search"
          class="archive-search"
          placeholder="Buscar por título, #hashtag ou número (#001)..."
          aria-label="Pesquisar tirinhas"
          autocomplete="off"
        >
        <p class="archive-search-results" id="archive-search-results" aria-live="polite"></p>
      </div>

      <!-- Lista de tirinhas -->
      <div id="archive-list" class="archive-list" aria-label="Todas as tirinhas"></div>

      <!-- Paginação -->
      <div id="archive-pagination" class="archive-pagination" hidden>
        <button type="button" id="page-prev" class="pagination-btn disabled" aria-label="Página anterior">
          ← Anterior
        </button>
        <span id="page-info" class="pagination-info">Pág. 1 / 1</span>
        <button type="button" id="page-next" class="pagination-btn" aria-label="Próxima página">
          Próxima →
        </button>
      </div>

    </div><!-- /.archive-page -->
  </main>

  <!-- ── Footer ── -->
  <footer class="site-footer" role="contentinfo">
    <span>dia sim, dia não.</span>
    <a href="index.html" class="footer-back">← última tirinha</a>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
