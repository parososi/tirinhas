<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Todas as tirinhas de Humberto Incerto publicadas até hoje.">
  <title>Tirinhas — Humberto Incerto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Lato:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="archive">

  <!-- ── Header / Masthead ── -->
  <header class="site-header" role="banner">
    <div class="header-inner">
      <a href="index.html" class="site-logo" aria-label="Humberto Incerto — página inicial">
        Humberto Incerto
      </a>
      <nav class="site-nav" aria-label="Navegação principal">
        <a href="arquivo.html" class="nav-link active" aria-current="page">Tirinhas</a>
        <a href="personagens.html" class="nav-link">Personagens</a>
        <a href="sobre.html" class="nav-link">Sobre</a>
        <a href="https://apoia.se/humbertoincerto" class="nav-link nav-apoiar" target="_blank" rel="noopener noreferrer">Apoiar</a>
      </nav>
    </div>
    <div class="header-dateline">
      <span id="header-date"></span>
      <span class="header-dateline-rule"></span>
      <span>pena &amp; nanquim</span>
    </div>
  </header>

  <!-- ── Conteúdo principal ── -->
  <main class="main-content">
    <div class="archive-page">

      <!-- Cabeçalho da página -->
      <div class="page-header">
        <h1>Tirinhas</h1>
        <p class="page-subtitle" id="archive-total"></p>
      </div>

      <!-- Loading -->
      <div id="archive-loading" class="loading-state" role="status" aria-live="polite">
        <div class="ink-loader" aria-hidden="true"></div>
        <span class="loading-text">Carregando arquivo...</span>
      </div>

      <!-- Pesquisa -->
      <div class="archive-search-wrap">
        <input
          type="search"
          id="archive-search"
          class="archive-search"
          placeholder="Buscar por título, #hashtag ou número (#001)…"
          aria-label="Pesquisar tirinhas"
          autocomplete="off"
        >
        <p class="archive-search-results" id="archive-search-results" aria-live="polite"></p>
      </div>

      <!-- Lista de tirinhas -->
      <div id="archive-list" class="archive-list" aria-label="Todas as tirinhas"></div>

      <!-- Paginação -->
      <div id="archive-pagination" class="archive-pagination" hidden>
        <button type="button" id="page-prev" class="pagination-btn disabled" aria-label="Página anterior">
          ← Anterior
        </button>
        <span id="page-info" class="pagination-info"></span>
        <button type="button" id="page-next" class="pagination-btn" aria-label="Próxima página">
          Próxima →
        </button>
      </div>

    </div><!-- /.archive-page -->
  </main>

  <!-- ── Botão fixo de apoio ── -->
  <a
    href="https://apoia.se/humbertoincerto"
    class="apoiar-btn"
    target="_blank"
    rel="noopener noreferrer"
    aria-label="Apoiar Humberto Incerto no Apoia.se"
  >
    <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
      <path d="M8 13.5l-1.1-1C3 9.1 1 7.3 1 5.2 1 3.4 2.4 2 4.2 2c1 0 2 .5 2.8 1.3.8-.8 1.8-1.3 2.8-1.3C11.6 2 13 3.4 13 5.2c0 2.1-2 3.9-5.9 7.3L8 13.5z"/>
    </svg>
    Apoiar
  </a>

  <!-- ── Footer ── -->
  <footer class="site-footer" role="contentinfo">
    <div class="footer-inner">
      <span class="footer-brand">Humberto Incerto</span>
      <div class="footer-links">
        <a href="https://instagram.com/humbertoincerto" class="footer-link" target="_blank" rel="noopener noreferrer">Instagram</a>
        <a href="https://apoia.se/humbertoincerto" class="footer-link" target="_blank" rel="noopener noreferrer">Apoia.se</a>
        <a href="index.html" class="footer-link">Início</a>
      </div>
      <span class="footer-copy">pena &amp; nanquim</span>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
