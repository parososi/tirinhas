<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Arquivo de todas as tirinhas publicadas.">
  <title>Arquivo — Tirinhas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="archive">

  <!-- Cursor customizado -->
  <div id="cursor" aria-hidden="true"></div>

  <!-- ── Header ── -->
  <header class="site-header" role="banner">
    <a href="index.html" class="site-logo" aria-label="Ir para a tirinha mais recente">
      Tirinhas
    </a>
    <nav class="site-nav" aria-label="Navegação principal">
      <a href="arquivo.html" class="nav-link active" aria-current="page">Arquivo</a>
    </nav>
  </header>

  <!-- ── Conteúdo principal ── -->
  <main class="main-content">
    <div class="archive-page">

      <!-- Cabeçalho da página -->
      <div class="archive-header">
        <h1>Arquivo</h1>
        <p class="archive-subtitle" id="archive-total"></p>
      </div>

      <!-- Loading -->
      <div id="archive-loading" class="loading-state" role="status" aria-live="polite">
        <div class="ink-loader" aria-hidden="true"></div>
        <span class="loading-text">Carregando arquivo...</span>
      </div>

      <!-- Grid de tirinhas -->
      <div id="archive-grid" class="archive-grid" aria-label="Todas as tirinhas"></div>

    </div><!-- /.archive-page -->
  </main>

  <!-- ── Footer ── -->
  <footer class="site-footer" role="contentinfo">
    <span>dia sim, dia não.</span>
    <a href="index.html" class="footer-back">← última tirinha</a>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
