<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Lato:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">

<body data-page="personagens">

  <!-- ── Header / Masthead ── -->
  <header class="site-header" role="banner">
    <div class="header-inner">
      <a href="index.html" class="site-logo" aria-label="Humberto Incerto — página inicial">
        Humberto Incerto
      </a>
      <nav class="site-nav" aria-label="Navegação principal">
        <a href="arquivo.html" class="nav-link">Tirinhas</a>
        <a href="personagens.html" class="nav-link active" aria-current="page">Personagens</a>
        <a href="sobre.html" class="nav-link">Sobre</a>

      </nav>
    </div>
  </header>

  <!-- ── Conteúdo principal ── -->
  <main class="main-content">
    <div class="characters-page">

      <!-- Cabeçalho da página -->
      <div class="page-header">
        <h1>Personagens</h1>
        <p class="page-subtitle" id="characters-total"></p>
      </div>

      <!-- Loading -->
      <div id="characters-loading" class="loading-state" role="status" aria-live="polite">
        <div class="ink-loader" aria-hidden="true"></div>
        <span class="loading-text">Carregando personagens...</span>
      </div>

      <!-- Grid de personagens — preenchido via JS -->
      <div id="characters-grid" class="characters-grid" aria-label="Personagens de Humberto Incerto"></div>

    </div><!-- /.characters-page -->
  </main>

  <!-- ── Botão fixo de apoio ── -->
  <a
    href="https://apoia.se/humbertoincerto"
    class="apoiar-btn"
    target="_blank"
    rel="noopener noreferrer"
    aria-label="Apoiar Humberto Incerto no Apoia.se"
  >
    <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
      <path d="M8 13.5l-1.1-1C3 9.1 1 7.3 1 5.2 1 3.4 2.4 2 4.2 2c1 0 2 .5 2.8 1.3.8-.8 1.8-1.3 2.8-1.3C11.6 2 13 3.4 13 5.2c0 2.1-2 3.9-5.9 7.3L8 13.5z"/>
