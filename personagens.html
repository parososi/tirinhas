<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Conheça os personagens das Tirinhas.">
  <title>Personagens — Tirinhas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="personagens">

  <!-- ── Header / Masthead ── -->
  <header class="site-header" role="banner">
    <div class="header-top-bar"></div>
    <div class="header-inner">
      <a href="index.html" class="site-logo" aria-label="Ir para a tirinha mais recente">
        Tirinhas
      </a>
      <nav class="site-nav" aria-label="Navegação principal">
        <a href="personagens.html" class="nav-link active" aria-current="page">Personagens</a>
        <a href="arquivo.html" class="nav-link">Arquivo</a>
      </nav>
    </div>
    <div class="header-dateline">
      <span id="header-date"></span>
      <span class="header-dateline-rule"></span>
      <span>dia sim, dia não</span>
    </div>
  </header>

  <!-- ── Conteúdo principal ── -->
  <main class="main-content">
    <div class="characters-page">

      <!-- Cabeçalho da página -->
      <div class="page-header">
        <h1>Personagens</h1>
        <p class="page-subtitle" id="characters-total"></p>
      </div>

      <!-- Loading -->
      <div id="characters-loading" class="loading-state" role="status" aria-live="polite">
        <div class="ink-loader" aria-hidden="true"></div>
        <span class="loading-text">Carregando personagens...</span>
      </div>

      <!-- Grid de personagens -->
      <div id="characters-grid" class="characters-grid" aria-label="Personagens das tirinhas"></div>

    </div><!-- /.characters-page -->
  </main>

  <!-- ── Footer ── -->
  <footer class="site-footer" role="contentinfo">
    <span>dia sim, dia não.</span>
    <a href="index.html" class="footer-back">← última tirinha</a>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
